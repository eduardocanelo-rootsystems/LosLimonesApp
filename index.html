<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preload" as="image" href="/logo-cliente.svg" fetchpriority="high" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0e1014" />
    <meta name="description" content="Sistema de gestión para Limones - Rope Access — presupuestos, contratos, ventas y movimientos." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
      />
    </noscript>
    <title>Limones - Rope Access · Sistema de Gestión</title>
    <style>
      #app-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2rem;background:#0e1014}
      #app-shell-brand{font-family:ui-monospace,monospace;font-size:1.25rem;color:#e8eaee;letter-spacing:-.02em;user-select:none}
      #app-shell-brand span{color:#00e5ff;font-weight:300}
      #app-shell-spinner{width:28px;height:28px;border-radius:50%;border:2px solid #262931;border-top-color:#B7FF00;animation:_s .75s linear infinite}
      @keyframes _s{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-shell">
        <div id="app-shell-brand"><span>/</span>root</div>
        <div id="app-shell-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
